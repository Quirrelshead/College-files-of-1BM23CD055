version:"3"

services:
  redis: 
    image: redis
    ports: 
      - "6379:6379"

    backend:
      build: .
      ports: 
        - "8000"
      depends_on:
        - redis

    nginx:
      image: nginx
      ports:  
        -"8080:80"
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf
      depends_on:
        -backend