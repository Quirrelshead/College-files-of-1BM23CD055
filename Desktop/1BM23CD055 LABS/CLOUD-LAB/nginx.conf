events {}

http {
    resolver 127.0.0.11 valid = 10s;

    upstream backend_servers {
        zone backend_zone 64k;
        server backend:8000 resolve;
    }

    server {
        listen 80;

        location / { 
            proxy_pass http://backend_servers;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}